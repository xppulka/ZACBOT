version: '3.9'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - LOG_LEVEL=info
      - REDIS_URL=redis://redis:6379
      - API_KEY=${API_KEY}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - LOVABLE_WEBHOOK_URL=${LOVABLE_WEBHOOK_URL}

volumes:
  redis-data:
